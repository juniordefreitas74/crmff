<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f3f0f7; color: #333; margin: 0; padding: 20px; }
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
    .kpi-card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 5px solid; }
    .kpi-card p { margin: 0; font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }
    .kpi-card h3 { margin: 5px 0; font-size: 18px; color: #888; }
    
    .filter-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .filter-grid { display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 15px; align-items: end; }
    .filter-group label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; }
    .filter-group input, .filter-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9; box-sizing: border-box; font-family: 'Poppins'; }
    
    .btn { border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; font-family: 'Poppins'; }
    .btn-filter { background: #00acee; color: white; margin-bottom: 5px; }
    .btn-clear { background: #e0e0e0; color: #666; }
    .btn-add { background: #ff3385; color: white; padding: 12px; margin-top: 15px; font-size: 16px; }

    .order-card { background: white; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); overflow: hidden; }
    .order-header { background: #007bff; color: white; padding: 10px 25px; display: inline-block; border-radius: 0 0 20px 0; font-weight: 700; font-size: 14px; }
    .card-content { padding: 20px 25px; display: grid; grid-template-columns: 80px 140px 100px 120px 120px 120px 1fr; gap: 15px; border-bottom: 1px solid #eee; }
    .data-label { font-size: 10px; color: #999; font-weight: 700; }
    .data-value { font-size: 12px; font-weight: 700; }
    .status-box { border-left: 1px solid #eee; padding-left: 10px; }
    .chk-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; margin-bottom: 3px; }
    
    #modalCadastro { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; }
    .modal-body { background:white; width:90%; max-width:700px; margin: 30px auto; padding:25px; border-radius:20px; max-height: 85vh; overflow-y: auto; }
    .item-form-row { display: grid; grid-template-columns: 70px 1fr 1fr 80px auto; gap: 10px; margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 10px; align-items: center; }

    .obs-box { border: 1px solid #ccc; border-radius: 15px; padding: 15px; height: 60px; font-size: 12px; color: #666; position: relative; }
  </style>
</head>
<body>

  <!-- KPI DASHBOARD -->
  <div class="kpi-row">
    <div class="kpi-card" style="border-color: #ff3385;"><p>TOTAL SEMANA</p><h3 id="k-ts">0</h3><p>TOTAL DIA</p><h3 id="k-td">0</h3></div>
    <div class="kpi-card" style="border-color: #00acee;"><p>EM PRODUÇÃO</p><h3 id="k-ep">0</h3><p>PRODUZIDO</p><h3 id="k-pr">0</h3></div>
    <div class="kpi-card" style="border-color: #ffcc00;"><p>ETIQ. LIBERADA</p><h3 id="k-el">0</h3><p>ETIQ. IMPRESSA</p><h3 id="k-ei">0</h3></div>
    <div class="kpi-card" style="border-color: #8e94f2;"><p>ENVIADOS</p><h3 id="k-ev">0</h3><p>REAGENDADO</p><h3 id="k-re">0</h3></div>
    <div class="kpi-card" style="border-color: #ff3385;"><p>PARA COMPRAR</p><h3 id="k-pc">0</h3></div>
  </div>

  <!-- FILTERS -->
  <div class="filter-container">
    <div class="filter-grid">
      <div class="filter-group"><label>BUSCA</label><input type="text" id="filtroBusca" placeholder="🔍 Procurar"></div>
      <div class="filter-group"><label>STATUS</label><input type="text" id="filtroStatus" placeholder="🔍 Status"></div>
      <div class="filter-group"><label>DATA</label><input type="date" id="filtroData"></div>
      <div class="filter-group"><label>SEMANA</label>
        <select id="filtroSemana">
          <option value="">Semana</option>
          <option>SEGUNDA</option><option>TERÇA</option><option>QUARTA</option><option>QUINTA</option><option>SEXTA</option><option>SÁBADO</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn btn-filter" onclick="filtrar()">🔍 FILTRAR</button>
        <button class="btn btn-clear" onclick="limpar()">🧹 LIMPAR</button>
      </div>
    </div>
    <button class="btn btn-add" onclick="abrirModal()">+ CADASTRAR</button>
  </div>

  <div id="listaPedidos">Carregando...</div>

  <!-- MODAL DE CADASTRO -->
  <div id="modalCadastro">
    <div class="modal-body">
      <h2 style="color:#ff3385; margin-top:0;">Novo Pedido</h2>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
        <div><label class="data-label">LOJA</label>
          <select id="cLoja"><option value="FF">FF</option><option value="PART">PART</option></select>
        </div>
        <div><label class="data-label">LOCAL</label>
          <select id="cLocal">
            <option value="FT">FT</option><option value="CT/FT">CT/FT</option>
            <option value="2MG/CT/FT">2MG/CT/FT</option><option value="BOLSO">BOLSO</option>
            <option value="BOLSO/CT">BOLSO/CT</option><option value="BOLSO/CT/FT">BOLSO/CT/FT</option>
            <option value="BOLSO/CT/FT/MG">BOLSO/CT/FT/MG</option>
          </select>
        </div>
        <input type="text" id="cLogo" placeholder="Logo">
        <input type="text" id="cNome" placeholder="Nome Cliente">
        <input type="text" id="cApelido" placeholder="Apelido">
        <div style="display:flex; gap:5px;">
          <input type="date" id="cData" onchange="setSemana()" style="flex:2">
          <input type="text" id="cSemana" placeholder="Semana" readonly style="flex:1">
        </div>
      </div>
      
      <h4 style="margin-bottom:10px;">Produtos</h4>
      <div id="itensPedidoContainer">
        <div class="item-form-row">
          <input type="number" class="iQtd" placeholder="Qtd">
          <select class="iProd">
            <option value="">Produto</option>
            <option>POLO BÁSICA</option><option>BABYLOOK POLO</option>
            <option>CAMISETA BÁSICA</option><option>CAMISETA POLIÉSTER</option>
            <option>CAMISETA BABYLOOK FEMININA</option>
          </select>
          <select class="iCor">
            <option value="">Cor</option>
            <option>BRANCO</option><option>PRETO</option><option>CINZA MESCLA</option><option>CINZA ESCURO</option><option>AZUL TURQUESA</option><option>AZUL ROYAL</option><option>AZUL MARINHO</option><option>VERDE BANDEIRA</option><option>VERDE LIMÃO</option><option>VERDE MUSGO</option><option>VERMELHO</option><option>VINHO</option><option>LARANJA</option><option>AMARELO</option><option>PINK</option>
          </select>
          <select class="iTam">
            <option>U</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>EG</option>
          </select>
          <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:5px; cursor:pointer; padding:5px 10px;">X</button>
        </div>
      </div>
      <button onclick="addLinhaForm()" style="padding:5px 15px; border-radius:10px; cursor:pointer;">+ Adicionar Produto</button>
      
      <div style="margin-top:20px;"><label><input type="checkbox" id="cPComprar"> MARCAR "P/ COMPRAR"</label></div>

      <button class="btn btn-add" onclick="salvar()">FINALIZAR CADASTRO</button>
      <button class="btn btn-clear" onclick="fecharModal()" style="margin-top:10px;">CANCELAR</button>
    </div>
  </div>

<script>
  let dadosBrutos = [];

  function carregar() {
    google.script.run.withSuccessHandler(res => {
      dadosBrutos = res.pedidos;
      renderizar(res.pedidos, res.kpis);
    }).getDados();
  }

  function renderizar(pedidos, kpis) {
    if(kpis){
      document.getElementById('k-ts').innerText = kpis.totalSemana;
      document.getElementById('k-td').innerText = kpis.totalDia;
      document.getElementById('k-ep').innerText = kpis.emProducao;
      document.getElementById('k-pr').innerText = kpis.produzido;
      document.getElementById('k-el').innerText = kpis.etiqLiberada;
      document.getElementById('k-ei').innerText = kpis.etiqImpressa;
      document.getElementById('k-ev').innerText = kpis.enviados;
      document.getElementById('k-re').innerText = kpis.reagendado;
      document.getElementById('k-pc').innerText = kpis.paraComprar;
    }

    const container = document.getElementById('listaPedidos');
    container.innerHTML = '';
    
    const grupos = pedidos.reduce((acc, p) => {
      if(!acc[p.ID]) acc[p.ID] = [];
      acc[p.ID].push(p);
      return acc;
    }, {});

    for (const id in grupos) {
      const itens = grupos[id];
      const p = itens[0];
      
      container.innerHTML += `
        <div class="order-card">
          <div class="order-header">NÚMERO:${p.ID}</div>
          <div class="card-content">
            <div><div class="data-label">LOJA</div><div class="data-value">${p.LOJA}</div><br><div class="data-label">LOCAL</div><div class="data-value">${p.LOCAL}</div></div>
            <div><div class="data-label">LOGO</div><div class="data-value">${p.LOGO}</div><br><div class="data-label">NOME</div><div class="data-value">${p.NOME}</div></div>
            <div><div class="data-label">APELIDO</div><div class="data-value">${p.APELIDO}</div></div>
            <div>
              <div class="data-label">DATA:</div><div class="data-value" style="color:#ff3385">${p.DATA}</div>
              <div class="data-label">SEM.:</div><div class="data-value" style="color:#ff3385">${p.SEMANA}</div>
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'COMPRADO', p.COMPRADO)}
              ${chk(p.rowIndex, 'MATRIZ', p.MATRIZ)}
              ${chk(p.rowIndex, 'AMOSTRA', p.AMOSTRA)}
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'EM_PRODUCAO', p.EM_PRODUCAO)}
              ${chk(p.rowIndex, 'PRODUZIDO', p.PRODUZIDO)}
            </div>
            <div style="text-align:right">
               <div class="chk-item"><input type="checkbox" ${p.P_COMPRAR=='TRUE'?'checked':''}> <span style="color:#ff3385">P/ COMPRAR</span></div>
            </div>
          </div>
          <div style="padding:15px 25px; display:grid; grid-template-columns: 2fr 1.5fr; gap:20px;">
            <table style="width:100%; border-collapse: collapse;">
              <thead><tr style="font-size:10px; color:#bbb; text-align:left;"><th>QUANTIDADE</th><th>PRODUTO</th><th>COR</th><th>TAMANHO</th></tr></thead>
              <tbody>
                ${itens.map(i => `<tr><td style="font-size:12px; font-weight:700; padding:5px 0;">${i.QTD}</td><td style="font-size:12px; font-weight:700;">${i.PRODUTO}</td><td style="font-size:12px; font-weight:700; color:#007bff">${i.COR}</td><td style="font-size:12px; font-weight:700;">${i.TAMANHO}</td></tr>`).join('')}
              </tbody>
            </table>
            <div class="obs-box"><div style="position:absolute; top:-8px; left:10px; background:white; font-size:10px; padding:0 5px;">OBSERVAÇÃO:</div>${p.OBS || ''}</div>
          </div>
        </div>
      `;
    }
  }

  function chk(row, campo, val) {
    return `<div class="chk-item"><input type="checkbox" ${val=='TRUE'?'checked':''} onchange="atualizar(${row},'${campo}',this.checked)"> ${campo}</div>`;
  }

  function filtrar() {
    const busca = document.getElementById('filtroBusca').value.toLowerCase();
    const data = document.getElementById('filtroData').value;
    const semana = document.getElementById('filtroSemana').value;

    const filtrados = dadosBrutos.filter(p => {
      const matchBusca = p.NOME.toLowerCase().includes(busca) || p.ID.includes(busca) || p.APELIDO.toLowerCase().includes(busca);
      const matchData = data ? p.DATA === data.split('-').reverse().join('/') : true;
      const matchSemana = semana ? p.SEMANA === semana : true;
      return matchBusca && matchData && matchSemana;
    });
    renderizar(filtrados);
  }

  function limpar() {
    document.getElementById('filtroBusca').value = '';
    document.getElementById('filtroData').value = '';
    document.getElementById('filtroSemana').value = '';
    carregar();
  }

  function abrirModal() { document.getElementById('modalCadastro').style.display = 'block'; }
  function fecharModal() { document.getElementById('modalCadastro').style.display = 'none'; }
  
  function addLinhaForm() {
    const container = document.getElementById('itensPedidoContainer');
    const row = container.children[0].cloneNode(true);
    row.querySelectorAll('input, select').forEach(i => i.value = '');
    container.appendChild(row);
  }

  function setSemana() {
    const d = new Date(document.getElementById('cData').value);
    const dias = ["DOMINGO","SEGUNDA","TERÇA","QUARTA","QUINTA","SEXTA","SÁBADO"];
    document.getElementById('cSemana').value = dias[d.getUTCDay()];
  }

  function salvar() {
    const cabecalho = {
      loja: document.getElementById('cLoja').value,
      local: document.getElementById('cLocal').value,
      logo: document.getElementById('cLogo').value,
      nome: document.getElementById('cNome').value,
      apelido: document.getElementById('cApelido').value,
      data: document.getElementById('cData').value.split('-').reverse().join('/'),
      semana: document.getElementById('cSemana').value,
      hora: new Date().toLocaleTimeString().substring(0,5),
      pComprar: document.getElementById('cPComprar').checked
    };
    
    const itens = Array.from(document.querySelectorAll('.item-form-row')).map(row => ({
      quantidade: row.querySelector('.iQtd').value,
      produto: row.querySelector('.iProd').value,
      cor: row.querySelector('.iCor').value,
      tamanho: row.querySelector('.iTam').value
    }));

    google.script.run.withSuccessHandler(() => {
      fecharModal();
      carregar();
    }).salvarPedido(cabecalho, itens);
  }

  function atualizar(row, campo, val) {
    google.script.run.withSuccessHandler(carregar).atualizarStatus(row, campo, val);
  }

  window.onload = carregar;
</script>
</body>
</html>
