<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f3f0f7;
      --bg-card: #ffffff;
      --text-main: #333333;
      --text-sub: #777777;
      --border-color: #eeeeee;
      --shadow: rgba(0,0,0,0.05);
    }

    body.dark-mode {
      --bg-body: #1a1a1a;
      --bg-card: #2d2d2d;
      --text-main: #e0e0e0;
      --text-sub: #aaaaaa;
      --border-color: #444444;
      --shadow: rgba(0,0,0,0.3);
    }

    body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px 10px; transition: background 0.3s, color 0.3s; }
    .container { max-width: 1200px; margin: 0 auto; position: relative; }

    /* BOTÃO MODO NOTURNO */
    .btn-dark-toggle { position: absolute; top: -10px; right: 0; background: var(--bg-card); border: 1px solid var(--border-color); padding: 8px; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px var(--shadow); z-index: 100; font-size: 16px; }

    /* ABAS */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
    .tab { padding: 10px 20px; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--text-sub); border-radius: 10px; transition: all 0.3s; }
    .tab.active { background: #ff3385; color: white; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 25px; }
    .kpi-card { background: var(--bg-card); padding: 12px; border-radius: 18px; text-align: center; box-shadow: 0 4px 12px var(--shadow); border-bottom: 5px solid; }
    .kpi-card p { margin: 0; font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
    .kpi-card h3 { margin: 4px 0; font-size: 18px; color: var(--text-main); }

    .filter-container { background: var(--bg-card); padding: 20px; border-radius: 25px; box-shadow: 0 5px 20px var(--shadow); margin-bottom: 25px; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; align-items: end; }
    .filter-group label { display: block; font-weight: 700; font-size: 11px; margin-bottom: 6px; color: var(--text-sub); }
    .filter-group input, .filter-group select { width: 100%; padding: 10px; border: 1.5px solid var(--border-color); border-radius: 10px; background: var(--bg-body); color: var(--text-main); box-sizing: border-box; font-family: 'Poppins'; font-size: 13px; }

    .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; font-family: 'Poppins'; font-size: 14px; }
    .btn-filter { background: #00acee; color: white; }
    .btn-clear { background: var(--border-color); color: var(--text-sub); }
    .btn-add { background: #ff3385; color: white; padding: 15px; margin-top: 15px; font-size: 16px; box-shadow: 0 4px 15px rgba(255, 51, 133, 0.3); }

    .separator { text-align: center; margin: 30px 0; font-weight: 700; color: var(--text-main); font-size: 18px; letter-spacing: 1px; }
    .separator::after { content: ""; display: block; width: 50px; height: 3px; background: #ff3385; margin: 8px auto; border-radius: 2px; }

    /* CARDS */
    .order-card { background: var(--bg-card); border-radius: 22px; margin-bottom: 25px; box-shadow: 0 8px 20px var(--shadow); overflow: hidden; border: 1px solid var(--border-color); }
    
    .status-p-comprar { background-color: rgba(227, 242, 253, 0.4) !important; }
    .status-comprado { background-color: rgba(241, 248, 233, 0.4) !important; border: 2px solid #8bc34a; }
    .status-em-producao { background-color: rgba(255, 253, 231, 0.4) !important; }
    .status-produzido { background-color: rgba(255, 249, 196, 0.6) !important; }
    .status-etiq-liberada { background-color: rgba(255, 249, 196, 0.6) !important; color: #2e7d32 !important; }
    .status-etiq-impressa { background-color: rgba(255, 249, 196, 0.6) !important; color: #9e9e9e !important; font-style: italic; font-weight: 300; }
    .status-reagendado { background-color: rgba(255, 243, 224, 0.6) !important; border: 1px solid #ffb74d; }

    body.dark-mode .status-p-comprar { background-color: rgba(30, 136, 229, 0.1) !important; }
    body.dark-mode .status-comprado { background-color: rgba(104, 159, 56, 0.1) !important; }

    .nome-comprado { color: #2e7d32 !important; text-decoration: underline; }
    .order-header { background: #007bff; color: white; padding: 10px 25px; display: inline-block; border-radius: 0 0 18px 0; font-weight: 700; font-size: 12px; }
    .card-content { padding: 20px 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; border-bottom: 1px solid var(--border-color); }
    .data-label { font-size: 10px; color: var(--text-sub); font-weight: 700; }
    .data-value { font-size: 13px; font-weight: 700; color: var(--text-main); }
    .status-box { border-left: 1.5px solid var(--border-color); padding-left: 15px; }
    .chk-item { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; margin-bottom: 5px; cursor: pointer; color: var(--text-main); }

    #modalCadastro { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; backdrop-filter: blur(3px); }
    .modal-body { background: var(--bg-card); color: var(--text-main); width: 95%; max-width: 850px; margin: 30px auto; padding: 25px; border-radius: 25px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
    .item-form-row { background: var(--bg-body); border: 1px solid var(--border-color); padding: 12px; border-radius: 15px; margin-bottom: 12px; }
    .obs-box { background: var(--bg-body); border: 1.5px solid var(--border-color); border-radius: 15px; padding: 12px; font-size: 11px; color: var(--text-sub); }
    .btn-side { width: 100%; padding: 8px; border-radius: 8px; border: none; font-size: 10px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 6px; }
  </style>
</head>
<body>

<div class="container">
  <button class="btn-dark-toggle" onclick="toggleDarkMode()" title="Modo Noturno">🌙</button>

  <div class="tabs">
    <div class="tab active" id="tabAtivos" onclick="mudarAba('ATIVOS')">PEDIDOS ATIVOS</div>
    <div class="tab" id="tabEnviados" onclick="mudarAba('ENVIADOS')">HISTÓRICO ENVIADOS</div>
  </div>

  <!-- KPI DASHBOARD -->
  <div class="kpi-row">
    <div class="kpi-card" style="border-color: #ff3385;"><p>TOTAL SEMANA</p><h3 id="k-ts">0</h3><p>TOTAL DIA</p><h3 id="k-td">0</h3></div>
    <div class="kpi-card" style="border-color: #00acee;"><p>EM PRODUÇÃO</p><h3 id="k-ep">0</h3><p>PRODUZIDO</p><h3 id="k-pr">0</h3></div>
    <div class="kpi-card" style="border-color: #ffcc00;"><p>ETIQ. LIBERADA</p><h3 id="k-el">0</h3><p>ETIQ. IMPRESSA</p><h3 id="k-ei">0</h3></div>
    <div class="kpi-card" style="border-color: #8e94f2;"><p>ENVIADOS</p><h3 id="k-ev">0</h3><p>REAGENDADO</p><h3 id="k-re">0</h3></div>
    <div class="kpi-card" style="border-color: #ff3385;"><p>PARA COMPRAR</p><h3 id="k-pc">0</h3></div>
  </div>

  <!-- FILTERS -->
  <div class="filter-container">
    <div class="filter-grid">
      <div class="filter-group"><label>BUSCA</label><input type="text" id="filtroBusca" placeholder="🔍 Nome ou ID"></div>
      <div class="filter-group"><label>STATUS</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="COMPRADO">COMPRADO</option>
          <option value="MATRIZ">MATRIZ</option>
          <option value="AMOSTRA">AMOSTRA</option>
          <option value="EM_PRODUCAO">EM PRODUÇÃO</option>
          <option value="PRODUZIDO">PRODUZIDO</option>
          <option value="ETIQ_LIBERADA">ETIQ. LIBERADA</option>
          <option value="P_COMPRAR">P/ COMPRAR</option>
        </select>
      </div>
      <div class="filter-group"><label>DATA</label><input type="date" id="filtroData"></div>
      <div class="filter-group"><label>SEMANA</label>
        <select id="filtroSemana">
          <option value="">Semana</option>
          <option>SEGUNDA</option><option>TERÇA</option><option>QUARTA</option><option>QUINTA</option><option>SEXTA</option><option>SÁBADO</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-filter" onclick="filtrar()">🔍 FILTRAR</button>
        <button class="btn btn-clear" onclick="limpar()">🧹 LIMPAR</button>
      </div>
    </div>
    <button class="btn btn-add" id="btnAddPedido" onclick="abrirModal()">+ CADASTRAR NOVO PEDIDO</button>
  </div>

  <div class="separator" id="tituloLista">LISTA DE PEDIDOS ATIVOS</div>
  <div id="listaPedidos"><div class="msg-vazio">Carregando...</div></div>
</div>

  <!-- MODAL DE CADASTRO -->
  <div id="modalCadastro">
    <div class="modal-body">
      <h2 id="modalTitle" style="color:#ff3385; margin: 0 0 20px 0; font-size: 20px; font-weight: 700;">Novo Pedido</h2>
      <input type="hidden" id="editPedidoId">
      <div class="form-grid">
        <div><label class="data-label">LOJA</label>
          <select id="cLoja">
            <option value="FF">FF</option><option value="PART">PART</option>
          </select>
        </div>
        <div><label class="data-label">LOCAL</label>
          <select id="cLocal">
            <option value="FT">FT</option><option value="CT/FT">CT/FT</option>
            <option value="2MG/CT/FT">2MG/CT/FT</option><option value="BOLSO">BOLSO</option>
            <option value="BOLSO/CT">BOLSO/CT</option><option value="BOLSO/CT/FT">BOLSO/CT/FT</option>
            <option value="BOLSO/CT/FT/MG">BOLSO/CT/FT/MG</option>
          </select>
        </div>
        <div><label class="data-label">LOGO</label><input type="text" id="cLogo" placeholder="Logo"></div>
        <div><label class="data-label">NOME CLIENTE</label><input type="text" id="cNome" placeholder="Nome"></div>
        <div><label class="data-label">APELIDO</label><input type="text" id="cApelido" placeholder="Apelido"></div>
        <div>
          <label class="data-label">DATA ENTREGA</label>
          <div style="display:flex; gap:8px;">
            <input type="date" id="cData" onchange="setSemana()" style="flex:2;">
            <input type="text" id="cSemana" placeholder="Sem" readonly style="flex:1; background:var(--bg-body); text-align: center; font-weight: 700;">
          </div>
        </div>
      </div>
      
      <div style="background: var(--bg-body); padding: 15px; border-radius: 20px; border: 1px solid var(--border-color);">
        <h4 style="margin: 0 0 15px 0; font-size: 15px; color: var(--text-sub);">Produtos da Venda</h4>
        <div id="itensPedidoContainer"></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button onclick="addLinhaForm()" style="flex: 1; padding: 10px; border: 1.5px dashed var(--text-sub); border-radius: 12px; cursor: pointer; background: var(--bg-card); color: var(--text-sub);">+ ADICIONAR LINHA</button>
          <button onclick="duplicarLinhaForm()" style="flex: 1; padding: 10px; border: 1.5px dashed var(--text-sub); border-radius: 12px; cursor: pointer; background: var(--bg-card); color: var(--text-sub);">📋 DUPLICAR ÚLTIMA LINHA</button>
        </div>
      </div>

      <div style="margin-top:20px; display: flex; gap: 20px; align-items: center;">
        <label class="chk-item" style="color: #007bff;"><input type="checkbox" id="cPComprar"> MARCAR "P/ COMPRAR"</label>
        <div id="boxReagendado" style="display: flex; align-items: center; gap: 10px;">
          <label class="chk-item" style="color: orange;"><input type="checkbox" id="cReagendado" onchange="toggleReagendado()"> REAGENDADO</label>
          <input type="date" id="cDataReagendado" style="display: none; padding: 5px; border: 1px solid orange; border-radius: 8px;">
        </div>
      </div>

      <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 12px;">
        <button class="btn btn-add" id="btnSalvar" onclick="salvar()">FINALIZAR E SALVAR</button>
        <button class="btn btn-clear" onclick="fecharModal()">CANCELAR</button>
      </div>
    </div>
  </div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwliSQKxeLPD7uQGC9co0w6obLSidV-cC4VyKnDwrFLJC5e63GV6Ia8SQ6Om-SPwY4M/exec';
  let dadosBrutos = [];
  let abaAtual = 'ATIVOS';

  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const btn = document.querySelector('.btn-dark-toggle');
    btn.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
  }

  function mudarAba(aba) {
    abaAtual = aba;
    document.getElementById('tabAtivos').classList.toggle('active', aba === 'ATIVOS');
    document.getElementById('tabEnviados').classList.toggle('active', aba === 'ENVIADOS');
    document.getElementById('tituloLista').innerText = aba === 'ATIVOS' ? 'LISTA DE PEDIDOS ATIVOS' : 'HISTÓRICO DE PEDIDOS ENVIADOS';
    document.getElementById('btnAddPedido').style.display = aba === 'ATIVOS' ? 'block' : 'none';
    carregar();
  }

  function carregar() {
    if (!WEB_APP_URL) return;
    document.getElementById('listaPedidos').innerHTML = '<div class="msg-vazio">Buscando dados...</div>';
    const script = document.createElement('script');
    script.src = WEB_APP_URL + '?action=getDados&tipo=' + abaAtual + '&callback=handleResponse';
    document.body.appendChild(script);
  }

  window.handleResponse = function(res) {
    if (res && res.pedidos) {
      dadosBrutos = res.pedidos;
      renderizar(res.pedidos, res.kpis);
    } else {
      document.getElementById('listaPedidos').innerHTML = '<div class="msg-vazio">Nenhum pedido encontrado nesta aba.</div>';
    }
  };

  function renderizar(pedidos, kpis) {
    if (kpis) {
      document.getElementById('k-ts').innerText = kpis.totalSemana;
      document.getElementById('k-td').innerText = kpis.totalDia;
      document.getElementById('k-ep').innerText = kpis.emProducao;
      document.getElementById('k-pr').innerText = kpis.produzido;
      document.getElementById('k-el').innerText = kpis.etiqLiberada;
      document.getElementById('k-ei').innerText = kpis.etiqImpressa;
      document.getElementById('k-ev').innerText = kpis.enviados;
      document.getElementById('k-re').innerText = kpis.reagendado;
      document.getElementById('k-pc').innerText = kpis.paraComprar;
    }
    const container = document.getElementById('listaPedidos');
    container.innerHTML = '';
    const grupos = pedidos.reduce((acc, p) => {
      const id = String(p.ID);
      if (!acc[id]) acc[id] = [];
      acc[id].push(p);
      return acc;
    }, {});

    for (const id in grupos) {
      const itens = grupos[id];
      const p = itens[0];
      
      let statusClass = '';
      if (p.P_COMPRAR == 'TRUE') statusClass = 'status-p-comprar';
      if (p.REAGENDADO == 'TRUE') statusClass = 'status-reagendado';
      if (p.EM_PRODUCAO == 'TRUE') statusClass = 'status-em-producao';
      if (p.PRODUZIDO == 'TRUE') statusClass = 'status-produzido';
      if (p.ETIQ_LIBERADA == 'TRUE') statusClass = 'status-etiq-liberada';
      if (p.ETIQ_IMPRESSA == 'TRUE') statusClass = 'status-etiq-impressa';
      if (p.COMPRADO == 'TRUE') statusClass = 'status-comprado';

      container.innerHTML += `
        <div class="order-card ${statusClass}">
          <div class="order-header">PEDIDO: ${p.ID}</div>
          <div class="card-content">
            <div>
              <div class="data-label">LOJA / LOCAL</div>
              <div class="data-value">${p.LOJA} - ${p.LOCAL}</div>
              <br>
              <div class="data-label">LOGO</div>
              <div class="data-value">${p.LOGO}</div>
            </div>
            <div>
              <div class="data-label">CLIENTE / APELIDO</div>
              <div class="data-value ${p.COMPRADO == 'TRUE' ? 'nome-comprado' : ''}">${p.NOME} (${p.APELIDO})</div>
              <br>
              <div class="data-label">ENTREGA</div>
              <div class="data-value" style="color:#ff3385">
                ${p.DATA} (${p.SEMANA})
                ${p.REAGENDADO == 'TRUE' ? `<br><span style="font-size:10px; background:orange; color:white; padding:3px 7px; border-radius:6px; margin-top:5px; display:inline-block;">REAGENDADO: ${p.DATA_REAGENDADO || ''}</span>` : ''}
              </div>
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'COMPRADO',  p.COMPRADO)}
              ${chk(p.rowIndex, 'MATRIZ',    p.MATRIZ)}
              ${chk(p.rowIndex, 'AMOSTRA',   p.AMOSTRA)}
              ${chkReag(p.rowIndex, p.REAGENDADO, p.DATA_REAGENDADO)}
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'EM_PRODUCAO',   p.EM_PRODUCAO)}
              ${chk(p.rowIndex, 'PRODUZIDO',     p.PRODUZIDO)}
              ${chk(p.rowIndex, 'ETIQ_LIBERADA', p.ETIQ_LIBERADA)}
              ${chk(p.rowIndex, 'ETIQ_IMPRESSA', p.ETIQ_IMPRESSA)}
              ${chk(p.rowIndex, 'ENVIADO',       p.ENVIADO)}
            </div>
            <div style="text-align:right">
              <div class="chk-item">
                <input type="checkbox" ${p.P_COMPRAR == 'TRUE' ? 'checked' : ''} onchange="atualizar(${p.rowIndex}, 'P_COMPRAR', this.checked)">
                <span style="color:#ff3385">P/ COMPRAR</span>
              </div>
              <button class="btn-side" style="background:#007bff" onclick="abrirEdicao('${id}')">EDITAR</button>
              <button class="btn-side" style="background:#ff3385" onclick="duplicarPedido('${id}')">DUPLICAR</button>
            </div>
          </div>
          <div style="padding:15px 25px; display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
            <table style="width:100%; border-collapse: collapse;">
              <thead>
                <tr style="font-size:10px; color:var(--text-sub); text-align:left; border-bottom: 1px solid var(--border-color);">
                  <th style="padding-bottom:5px;">QTD</th><th style="padding-bottom:5px;">PRODUTO</th><th style="padding-bottom:5px;">COR</th><th style="padding-bottom:5px;">TAM</th>
                </tr>
              </thead>
              <tbody>
                ${itens.map(i => `
                  <tr>
                    <td style="font-size:12px; font-weight:700; padding:8px 0; color:var(--text-main);">${i.QTD}</td>
                    <td style="font-size:12px; font-weight:700; color:var(--text-main);">${i.PRODUTO}</td>
                    <td style="font-size:12px; font-weight:700; color:#007bff">${i.COR}</td>
                    <td style="font-size:12px; font-weight:700; color:var(--text-main);">${i.TAMANHO}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
            <div class="obs-box">
              <div style="position:absolute; top:-8px; left:12px; background:var(--bg-card); font-size:10px; padding:0 6px; font-weight:700;">OBSERVAÇÕES</div>
              ${p.OBS || ''}
            </div>
          </div>
        </div>`;
    }
  }

  function chk(row, campo, val) {
    return `<label class="chk-item"><input type="checkbox" ${val == 'TRUE' ? 'checked' : ''} onchange="atualizar(${row}, '${campo}', this.checked)"> ${campo.replace('_', ' ')}</label>`;
  }

  function chkReag(row, val, data) {
    return `<label class="chk-item"><input type="checkbox" ${val == 'TRUE' ? 'checked' : ''} onchange="promptReagendar(${row}, this.checked)"> REAGENDADO</label>`;
  }

  function promptReagendar(row, checked) {
    if (checked) {
      const data = prompt("Data de Reagendamento (DD/MM/YYYY):");
      if (data) atualizar(row, 'DATA_REAGENDADO', data);
      else carregar();
    } else {
      atualizar(row, 'REAGENDADO', false);
    }
  }

  function toggleReagendado() {
    const check = document.getElementById('cReagendado').checked;
    document.getElementById('cDataReagendado').style.display = check ? 'block' : 'none';
  }

  function filtrar() {
    const busca = document.getElementById('filtroBusca').value.toLowerCase().trim();
    const status = document.getElementById('filtroStatus').value;
    const data = document.getElementById('filtroData').value;
    const semana = document.getElementById('filtroSemana').value;
    const filtrados = dadosBrutos.filter(p => {
      const matchBusca = !busca || (p.NOME && p.NOME.toLowerCase().includes(busca)) || (p.ID && String(p.ID).toLowerCase().includes(busca));
      const matchStatus = !status || p[status] == 'TRUE';
      let matchData = true;
      if (data) {
        const d = data.split('-');
        matchData = p.DATA === `${d[2]}/${d[1]}/${d[0]}`;
      }
      const matchSemana = !semana || p.SEMANA === semana;
      return matchBusca && matchStatus && matchData && matchSemana;
    });
    renderizar(filtrados, null);
  }

  function limpar() {
    document.getElementById('filtroBusca').value = '';
    document.getElementById('filtroStatus').value = '';
    document.getElementById('filtroData').value = '';
    document.getElementById('filtroSemana').value = '';
    carregar();
  }

  function abrirModal() {
    document.getElementById('modalTitle').innerText = 'Novo Pedido';
    document.getElementById('editPedidoId').value = '';
    document.getElementById('cNome').value = '';
    document.getElementById('cLogo').value = '';
    document.getElementById('cApelido').value = '';
    document.getElementById('cData').value = '';
    document.getElementById('cSemana').value = '';
    document.getElementById('cPComprar').checked = false;
    document.getElementById('cReagendado').checked = false;
    document.getElementById('cDataReagendado').style.display = 'none';
    document.getElementById('itensPedidoContainer').innerHTML = '';
    addLinhaForm();
    document.getElementById('modalCadastro').style.display = 'block';
  }

  function fecharModal() { document.getElementById('modalCadastro').style.display = 'none'; }

  function addLinhaForm(qtd='', prod='', cor='', tam='', obs='') {
    const container = document.getElementById('itensPedidoContainer');
    const row = document.createElement('div');
    row.className = 'item-form-row';
    row.innerHTML = `
      <div style="display: grid; grid-template-columns: 70px 1.5fr 1fr 80px auto; gap: 10px; align-items: center;">
        <input type="number" class="iQtd" placeholder="Qtd" min="1" value="${qtd}" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:10px; background:var(--bg-card); color:var(--text-main);">
        <select class="iProd" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:10px; background:var(--bg-card); color:var(--text-main);"><option value="">Produto</option><option ${prod=='POLO BÁSICA'?'selected':''}>POLO BÁSICA</option><option ${prod=='BABYLOOK POLO'?'selected':''}>BABYLOOK POLO</option><option ${prod=='CAMISETA BÁSICA'?'selected':''}>CAMISETA BÁSICA</option><option ${prod=='CAMISETA POLIÉSTER'?'selected':''}>CAMISETA POLIÉSTER</option><option ${prod=='CAMISETA BABYLOOK FEMININA'?'selected':''}>CAMISETA BABYLOOK FEMININA</option></select>
        <select class="iCor" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:10px; background:var(--bg-card); color:var(--text-main);"><option value="">Cor</option><option ${cor=='BRANCO'?'selected':''}>BRANCO</option><option ${cor=='PRETO'?'selected':''}>PRETO</option><option ${cor=='CINZA MESCLA'?'selected':''}>CINZA MESCLA</option><option ${cor=='CINZA ESCURO'?'selected':''}>CINZA ESCURO</option><option ${cor=='AZUL TURQUESA'?'selected':''}>AZUL TURQUESA</option><option ${cor=='AZUL ROYAL'?'selected':''}>AZUL ROYAL</option><option ${cor=='AZUL MARINHO'?'selected':''}>AZUL MARINHO</option><option ${cor=='VERDE BANDEIRA'?'selected':''}>VERDE BANDEIRA</option><option ${cor=='VERDE LIMÃO'?'selected':''}>VERDE LIMÃO</option><option ${cor=='VERDE MUSGO'?'selected':''}>VERDE MUSGO</option><option ${cor=='VERMELHO'?'selected':''}>VERMELHO</option><option ${cor=='VINHO'?'selected':''}>VINHO</option><option ${cor=='LARANJA'?'selected':''}>LARANJA</option><option ${cor=='AMARELO'?'selected':''}>AMARELO</option><option ${cor=='PINK'?'selected':''}>PINK</option></select>
        <select class="iTam" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:10px; background:var(--bg-card); color:var(--text-main);"><option ${tam=='U'?'selected':''}>U</option><option ${tam=='P'?'selected':''}>P</option><option ${tam=='M'?'selected':''}>M</option><option ${tam=='G'?'selected':''}>G</option><option ${tam=='GG'?'selected':''}>GG</option><option ${tam=='EG'?'selected':''}>EG</option></select>
        <button onclick="this.parentElement.parentElement.remove()" style="background:#ff3385; color:white; border:none; border-radius:8px; cursor:pointer; padding:10px; font-weight: bold;">X</button>
      </div>
      <input type="text" class="iObs" placeholder="Observação do item" value="${obs}" style="width:100%; padding:8px; border:1px solid var(--border-color); border-radius:8px; font-size:11px; margin-top:8px; background:var(--bg-card); color:var(--text-main);">`;
    container.appendChild(row);
  }

  function duplicarLinhaForm() {
    const rows = document.querySelectorAll('.item-form-row');
    if (rows.length === 0) return addLinhaForm();
    const last = rows[rows.length - 1];
    addLinhaForm(
      last.querySelector('.iQtd').value,
      last.querySelector('.iProd').value,
      last.querySelector('.iCor').value,
      last.querySelector('.iTam').value,
      last.querySelector('.iObs').value
    );
  }

  function setSemana() {
    const val = document.getElementById('cData').value;
    if (!val) return;
    const d = new Date(val + 'T12:00:00');
    const dias = ["DOMINGO","SEGUNDA","TERÇA","QUARTA","QUINTA","SEXTA","SÁBADO"];
    document.getElementById('cSemana').value = dias[d.getDay()];
  }

  function abrirEdicao(pedidoId) {
    const itens = dadosBrutos.filter(p => String(p.ID) === String(pedidoId));
    const p = itens[0];
    document.getElementById('modalTitle').innerText = 'Editando Pedido ' + pedidoId;
    document.getElementById('editPedidoId').value = pedidoId;
    document.getElementById('cLoja').value = p.LOJA;
    document.getElementById('cLocal').value = p.LOCAL;
    document.getElementById('cLogo').value = p.LOGO;
    document.getElementById('cNome').value = p.NOME;
    document.getElementById('cApelido').value = p.APELIDO;
    if (p.DATA) {
      const d = p.DATA.split('/');
      document.getElementById('cData').value = `${d[2]}-${d[1]}-${d[0]}`;
    }
    document.getElementById('cSemana').value = p.SEMANA;
    document.getElementById('cPComprar').checked = p.P_COMPRAR == 'TRUE';
    document.getElementById('cReagendado').checked = p.REAGENDADO == 'TRUE';
    document.getElementById('cDataReagendado').value = p.DATA_REAGENDADO || '';
    toggleReagendado();

    const container = document.getElementById('itensPedidoContainer');
    container.innerHTML = '';
    itens.forEach(i => addLinhaForm(i.QTD, i.PRODUTO, i.COR, i.TAMANHO, i.OBS));
    document.getElementById('modalCadastro').style.display = 'block';
  }

  async function salvar() {
    const btn = document.getElementById('btnSalvar');
    const editId = document.getElementById('editPedidoId').value;
    const nome = document.getElementById('cNome').value.trim();
    const data = document.getElementById('cData').value;
    if (!nome || !data) { alert('Nome e Data são obrigatórios.'); return; }
    
    const itens = Array.from(document.querySelectorAll('.item-form-row')).map(row => ({
      quantidade: row.querySelector('.iQtd').value,
      produto:    row.querySelector('.iProd').value,
      cor:        row.querySelector('.iCor').value,
      tamanho:    row.querySelector('.iTam').value,
      obs:        row.querySelector('.iObs').value
    })).filter(i => i.produto && i.quantidade);

    if (itens.length === 0) { alert('Adicione ao menos um produto.'); return; }
    
    const d = data.split('-');
    const cab = {
      loja: document.getElementById('cLoja').value,
      local: document.getElementById('cLocal').value,
      logo: document.getElementById('cLogo').value,
      nome: nome,
      apelido: document.getElementById('cApelido').value,
      data: `${d[2]}/${d[1]}/${d[0]}`,
      semana: document.getElementById('cSemana').value,
      hora: new Date().toLocaleTimeString('pt-BR').substring(0, 5),
      pComprar: document.getElementById('cPComprar').checked,
      reagendado: document.getElementById('cReagendado').checked,
      dataReagendado: document.getElementById('cDataReagendado').value
    };

    btn.disabled = true;
    btn.innerText = 'SALVANDO...';
    await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: editId ? 'editarPedido' : 'salvarPedido', pedidoId: editId, cabecalho: cab, itens: itens })
    });
    
    fecharModal();
    btn.disabled = false;
    btn.innerText = 'FINALIZAR E SALVAR';
    setTimeout(carregar, 1500);
  }

  function atualizar(row, campo, val) {
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'atualizarStatus', rowIndex: row, campo: campo, valor: val })
    }).then(() => setTimeout(carregar, 1000));
  }

  function duplicarPedido(pedidoId) {
    if (!confirm('Duplicar esta venda inteira?')) return;
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'duplicarPedido', pedidoId: pedidoId })
    }).then(() => setTimeout(carregar, 1000));
  }

  window.onload = carregar;
</script>
</body>
</html>
