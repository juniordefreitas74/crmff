<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f3f0f7; color: #333; margin: 0; padding: 10px; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid; }
    .kpi-card p { margin: 0; font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; }
    .kpi-card h3 { margin: 2px 0; font-size: 15px; color: #888; }
    .filter-container { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; align-items: end; }
    .filter-group label { display: block; font-weight: 700; font-size: 11px; margin-bottom: 5px; }
    .filter-group input, .filter-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; box-sizing: border-box; font-family: 'Poppins'; font-size: 12px; }
    .btn { border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; font-family: 'Poppins'; font-size: 13px; }
    .btn-filter { background: #00acee; color: white; margin-bottom: 5px; }
    .btn-clear { background: #e0e0e0; color: #666; }
    .btn-add { background: #ff3385; color: white; padding: 12px; margin-top: 10px; font-size: 14px; }
    .separator { text-align: center; margin: 20px 0; font-weight: 700; color: #2c3e50; font-size: 16px; letter-spacing: 1px; }

    /* CARD DINÂMICO */
    .order-card { background: white; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); overflow: hidden; transition: all 0.3s; }
    
    /* CORES DE STATUS */
    .status-p-comprar { background-color: #e3f2fd !important; } /* Azul clarinho */
    .status-comprado { background-color: #f1f8e9 !important; border: 2px solid #8bc34a; } /* Diferente */
    .status-em-producao { background-color: #fffde7 !important; } /* Amarelo pálido */
    .status-produzido { background-color: #fff9c4 !important; } /* Amarelo forte */
    .status-etiq-liberada { background-color: #fff9c4 !important; color: #2e7d32 !important; } /* Amarelo + Letras Verdes */
    .status-etiq-impressa { background-color: #fff9c4 !important; color: #9e9e9e !important; font-style: italic; font-weight: 300; } /* Amarelo + Letras Cinzas/Italico */
    .status-reagendado { background-color: #fff3e0 !important; border: 1px solid #ffb74d; } /* Laranja pastel */

    .nome-comprado { color: #2e7d32 !important; } /* Cor do nome quando comprado */

    .order-header { background: #007bff; color: white; padding: 8px 20px; display: inline-block; border-radius: 0 0 15px 0; font-weight: 700; font-size: 11px; }
    .card-content { padding: 15px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; border-bottom: 1px solid #eee; }
    .data-label { font-size: 9px; color: #999; font-weight: 700; }
    .data-value { font-size: 11px; font-weight: 700; }
    .status-box { border-left: 1px solid #eee; padding-left: 10px; }
    .chk-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; margin-bottom: 2px; }
    
    #modalCadastro { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; }
    .modal-body { background:white; width: 95%; max-width: 800px; margin: 20px auto; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .item-form-row { display: grid; grid-template-columns: 60px 1fr 1fr 70px auto; gap: 8px; margin-bottom: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px; align-items: center; }
    @media (max-width: 600px) { .item-form-row { grid-template-columns: 1fr 1fr; } .item-form-row *:nth-child(5) { grid-column: span 2; } }
    .obs-box { border: 1px solid #ccc; border-radius: 12px; padding: 10px; min-height: 40px; font-size: 10px; color: #666; position: relative; width: 100%; box-sizing: border-box; }
    .btn-side { width: 100%; padding: 5px; border-radius: 6px; border: none; font-size: 9px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 4px; }
    .msg-vazio { text-align: center; color: #aaa; padding: 30px; font-size: 13px; }
  </style>
</head>
<body>

  <div class="kpi-row">
    <div class="kpi-card" style="border-color: #ff3385;"><p>TOTAL SEMANA</p><h3 id="k-ts">0</h3><p>TOTAL DIA</p><h3 id="k-td">0</h3></div>
    <div class="kpi-card" style="border-color: #00acee;"><p>EM PRODUÇÃO</p><h3 id="k-ep">0</h3><p>PRODUZIDO</p><h3 id="k-pr">0</h3></div>
    <div class="kpi-card" style="border-color: #ffcc00;"><p>ETIQ. LIBERADA</p><h3 id="k-el">0</h3><p>ETIQ. IMPRESSA</p><h3 id="k-ei">0</h3></div>
    <div class="kpi-card" style="border-color: #8e94f2;"><p>ENVIADOS</p><h3 id="k-ev">0</h3><p>REAGENDADO</p><h3 id="k-re">0</h3></div>
    <div class="kpi-card" style="border-color: #ff3385;"><p>PARA COMPRAR</p><h3 id="k-pc">0</h3></div>
  </div>

  <div class="filter-container">
    <div class="filter-grid">
      <div class="filter-group"><label>BUSCA</label><input type="text" id="filtroBusca" placeholder="🔍 Nome ou ID"></div>
      <div class="filter-group"><label>STATUS</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="COMPRADO">COMPRADO</option>
          <option value="MATRIZ">MATRIZ</option>
          <option value="AMOSTRA">AMOSTRA</option>
          <option value="EM_PRODUCAO">EM PRODUÇÃO</option>
          <option value="PRODUZIDO">PRODUZIDO</option>
          <option value="ETIQ_LIBERADA">ETIQ. LIBERADA</option>
          <option value="P_COMPRAR">P/ COMPRAR</option>
        </select>
      </div>
      <div class="filter-group"><label>DATA</label><input type="date" id="filtroData"></div>
      <div class="filter-group"><label>SEMANA</label>
        <select id="filtroSemana">
          <option value="">Semana</option>
          <option>SEGUNDA</option><option>TERÇA</option><option>QUARTA</option><option>QUINTA</option><option>SEXTA</option><option>SÁBADO</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn btn-filter" onclick="filtrar()">🔍 FILTRAR</button>
        <button class="btn btn-clear" onclick="limpar()">🧹 LIMPAR</button>
      </div>
    </div>
    <button class="btn btn-add" onclick="abrirModal()">+ CADASTRAR NOVO PEDIDO</button>
  </div>

  <div class="separator">LISTA DE PEDIDOS ATIVOS</div>
  <div id="listaPedidos"><div class="msg-vazio">Carregando...</div></div>

  <div id="modalCadastro">
    <div class="modal-body">
      <h2 id="modalTitle" style="color:#ff3385; margin: 0 0 15px 0; font-size: 18px;">Novo Pedido</h2>
      <input type="hidden" id="editPedidoId">
      <div class="form-grid">
        <div><label class="data-label">LOJA</label>
          <select id="cLoja" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <option value="FF">FF</option><option value="PART">PART</option>
          </select>
        </div>
        <div><label class="data-label">LOCAL</label>
          <select id="cLocal" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <option value="FT">FT</option><option value="CT/FT">CT/FT</option>
            <option value="2MG/CT/FT">2MG/CT/FT</option><option value="BOLSO">BOLSO</option>
            <option value="BOLSO/CT">BOLSO/CT</option><option value="BOLSO/CT/FT">BOLSO/CT/FT</option>
            <option value="BOLSO/CT/FT/MG">BOLSO/CT/FT/MG</option>
          </select>
        </div>
        <div><label class="data-label">LOGO</label><input type="text" id="cLogo" placeholder="Logo" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;"></div>
        <div><label class="data-label">NOME CLIENTE</label><input type="text" id="cNome" placeholder="Nome" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;"></div>
        <div><label class="data-label">APELIDO</label><input type="text" id="cApelido" placeholder="Apelido" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;"></div>
        <div>
          <label class="data-label">DATA ENTREGA</label>
          <div style="display:flex; gap:5px;">
            <input type="date" id="cData" onchange="setSemana()" style="flex:2; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="cSemana" placeholder="Sem" readonly style="flex:1; padding:8px; border:1px solid #ddd; border-radius:8px; background:#f0f0f0; text-align: center;">
          </div>
        </div>
      </div>
      <h4 style="margin: 15px 0 10px 0; font-size: 14px;">Produtos</h4>
      <div id="itensPedidoContainer">
        <div class="item-form-row">
          <input type="number" class="iQtd" placeholder="Qtd" min="1" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
          <select class="iProd" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <option value="">Produto</option>
            <option>POLO BÁSICA</option><option>BABYLOOK POLO</option>
            <option>CAMISETA BÁSICA</option><option>CAMISETA POLIÉSTER</option>
            <option>CAMISETA BABYLOOK FEMININA</option>
          </select>
          <select class="iCor" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <option value="">Cor</option>
            <option>BRANCO</option><option>PRETO</option><option>CINZA MESCLA</option><option>CINZA ESCURO</option><option>AZUL TURQUESA</option><option>AZUL ROYAL</option><option>AZUL MARINHO</option><option>VERDE BANDEIRA</option><option>VERDE LIMÃO</option><option>VERDE MUSGO</option><option>VERMELHO</option><option>VINHO</option><option>LARANJA</option><option>AMARELO</option><option>PINK</option>
          </select>
          <select class="iTam" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;">
            <option>U</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>EG</option>
          </select>
          <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:5px; cursor:pointer; padding:8px; font-weight: bold;">X</button>
        </div>
      </div>
      <button onclick="addLinhaForm()" style="margin-top:5px; padding:8px 15px; border:1px solid #ddd; border-radius:8px; cursor:pointer; background:#f9f9f9; font-weight: 600;">+ Adicionar Produto</button>
      <div style="margin-top:15px;"><label style="font-size: 12px; font-weight: 700;"><input type="checkbox" id="cPComprar"> MARCAR "P/ COMPRAR"</label></div>
      <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-add" id="btnSalvar" onclick="salvar()">FINALIZAR CADASTRO</button>
        <button class="btn btn-clear" onclick="fecharModal()">CANCELAR</button>
      </div>
    </div>
  </div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwliSQKxeLPD7uQGC9co0w6obLSidV-cC4VyKnDwrFLJC5e63GV6Ia8SQ6Om-SPwY4M/exec';
  let dadosBrutos = [];

  function carregar() {
    if (!WEB_APP_URL) return;
    document.getElementById('listaPedidos').innerHTML = '<div class="msg-vazio">Carregando dados...</div>';
    const script = document.createElement('script');
    script.src = WEB_APP_URL + '?action=getDados&callback=handleResponse';
    document.body.appendChild(script);
  }

  window.handleResponse = function(res) {
    if (res && res.pedidos) {
      dadosBrutos = res.pedidos;
      renderizar(res.pedidos, res.kpis);
    } else {
      document.getElementById('listaPedidos').innerHTML = '<div class="msg-vazio">Nenhum pedido encontrado.</div>';
    }
  };

  function renderizar(pedidos, kpis) {
    if (kpis) {
      document.getElementById('k-ts').innerText = kpis.totalSemana  || 0;
      document.getElementById('k-td').innerText = kpis.totalDia     || 0;
      document.getElementById('k-ep').innerText = kpis.emProducao   || 0;
      document.getElementById('k-pr').innerText = kpis.produzido    || 0;
      document.getElementById('k-el').innerText = kpis.etiqLiberada || 0;
      document.getElementById('k-ei').innerText = kpis.etiqImpressa || 0;
      document.getElementById('k-ev').innerText = kpis.enviados     || 0;
      document.getElementById('k-re').innerText = kpis.reagendado   || 0;
      document.getElementById('k-pc').innerText = kpis.paraComprar  || 0;
    }
    const container = document.getElementById('listaPedidos');
    container.innerHTML = '';
    const grupos = pedidos.reduce(function(acc, p) {
      const id = String(p.ID);
      if (!acc[id]) acc[id] = [];
      acc[id].push(p);
      return acc;
    }, {});

    for (const id in grupos) {
      const itens = grupos[id];
      const p = itens[0];
      
      // LÓGICA DE CLASSES DE STATUS
      let statusClass = '';
      if (p.P_COMPRAR == 'TRUE') statusClass = 'status-p-comprar';
      if (p.REAGENDADO == 'TRUE') statusClass = 'status-reagendado';
      if (p.EM_PRODUCAO == 'TRUE') statusClass = 'status-em-producao';
      if (p.PRODUZIDO == 'TRUE') statusClass = 'status-produzido';
      if (p.ETIQ_LIBERADA == 'TRUE') statusClass = 'status-etiq-liberada';
      if (p.ETIQ_IMPRESSA == 'TRUE') statusClass = 'status-etiq-impressa';
      if (p.COMPRADO == 'TRUE') statusClass = 'status-comprado';

      container.innerHTML += `
        <div class="order-card ${statusClass}">
          <div class="order-header">PEDIDO: ${p.ID}</div>
          <div class="card-content">
            <div>
              <div class="data-label">LOJA / LOCAL</div>
              <div class="data-value">${p.LOJA || ''} - ${p.LOCAL || ''}</div>
              <br>
              <div class="data-label">LOGO</div>
              <div class="data-value">${p.LOGO || ''}</div>
            </div>
            <div>
              <div class="data-label">CLIENTE / APELIDO</div>
              <div class="data-value ${p.COMPRADO == 'TRUE' ? 'nome-comprado' : ''}">${p.NOME || ''} (${p.APELIDO || ''})</div>
              <br>
              <div class="data-label">ENTREGA</div>
              <div class="data-value" style="color:#ff3385">
                ${p.DATA || ''} (${p.SEMANA || ''})
                ${p.REAGENDADO == 'TRUE' ? '<br><span style="font-size:10px; background:orange; color:white; padding:2px 5px; border-radius:4px;">REAGENDADO</span>' : ''}
              </div>
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'COMPRADO',  p.COMPRADO)}
              ${chk(p.rowIndex, 'MATRIZ',    p.MATRIZ)}
              ${chk(p.rowIndex, 'AMOSTRA',   p.AMOSTRA)}
              ${chk(p.rowIndex, 'REAGENDADO',p.REAGENDADO)}
            </div>
            <div class="status-box">
              ${chk(p.rowIndex, 'EM_PRODUCAO',   p.EM_PRODUCAO)}
              ${chk(p.rowIndex, 'PRODUZIDO',     p.PRODUZIDO)}
              ${chk(p.rowIndex, 'ETIQ_LIBERADA', p.ETIQ_LIBERADA)}
              ${chk(p.rowIndex, 'ETIQ_IMPRESSA', p.ETIQ_IMPRESSA)}
              ${chk(p.rowIndex, 'ENVIADO',       p.ENVIADO)}
            </div>
            <div style="text-align:right">
              <div class="chk-item">
                <input type="checkbox" ${p.P_COMPRAR == 'TRUE' ? 'checked' : ''}
                  onchange="atualizar(${p.rowIndex}, 'P_COMPRAR', this.checked)">
                <span style="color:#ff3385">P/ COMPRAR</span>
              </div>
              <button class="btn-side" style="background:#007bff" onclick="abrirEdicao('${id}')">EDITAR</button>
              <button class="btn-side" style="background:#00cfd5" onclick="adicionarLinha('${id}')">ADICIONAR LINHA</button>
              <button class="btn-side" style="background:#8e94f2" onclick="duplicarLinha('${id}')">DUPLICAR LINHA</button>
              <button class="btn-side" style="background:#ff3385" onclick="duplicarPedido('${id}')">DUPLICAR PEDIDO</button>
            </div>
          </div>
          <div style="padding:10px 20px; display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
            <table style="width:100%; border-collapse: collapse;">
              <thead>
                <tr style="font-size:9px; color:#bbb; text-align:left;">
                  <th>QTD</th><th>PRODUTO</th><th>COR</th><th>TAM</th>
                </tr>
              </thead>
              <tbody>
                ${itens.map(i => `
                  <tr>
                    <td style="font-size:11px; font-weight:700; padding:4px 0;">${i.QTD || ''}</td>
                    <td style="font-size:11px; font-weight:700;">${i.PRODUTO || ''}</td>
                    <td style="font-size:11px; font-weight:700; color:#007bff">${i.COR || ''}</td>
                    <td style="font-size:11px; font-weight:700;">${i.TAMANHO || ''}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
            <div class="obs-box">
              <div style="position:absolute; top:-8px; left:10px; background:white; font-size:9px; padding:0 5px;">OBS:</div>
              ${p.OBS || ''}
            </div>
          </div>
        </div>`;
    }
  }

  function chk(row, campo, val) {
    return `<div class="chk-item">
      <input type="checkbox" ${val == 'TRUE' ? 'checked' : ''}
        onchange="atualizar(${row}, '${campo}', this.checked)">
      ${campo.replace('_', ' ')}
    </div>`;
  }

  function filtrar() {
    const busca = document.getElementById('filtroBusca').value.toLowerCase().trim();
    const status = document.getElementById('filtroStatus').value;
    const data = document.getElementById('filtroData').value;
    const semana = document.getElementById('filtroSemana').value;
    const filtrados = dadosBrutos.filter(p => {
      const matchBusca = !busca || (p.NOME && p.NOME.toLowerCase().includes(busca)) || (p.ID && String(p.ID).toLowerCase().includes(busca));
      const matchStatus = !status || p[status] == 'TRUE';
      let matchData = true;
      if (data) {
        const partes = data.split('-');
        matchData = p.DATA === (partes[2] + '/' + partes[1] + '/' + partes[0]);
      }
      const matchSemana = !semana || p.SEMANA === semana;
      return matchBusca && matchStatus && matchData && matchSemana;
    });
    renderizar(filtrados, null);
  }

  function limpar() {
    document.getElementById('filtroBusca').value = '';
    document.getElementById('filtroStatus').value = '';
    document.getElementById('filtroData').value = '';
    document.getElementById('filtroSemana').value = '';
    carregar();
  }

  function abrirModal() {
    document.getElementById('modalTitle').innerText = 'Novo Pedido';
    document.getElementById('editPedidoId').value = '';
    document.getElementById('cNome').value = '';
    document.getElementById('cLogo').value = '';
    document.getElementById('cApelido').value = '';
    document.getElementById('cData').value = '';
    document.getElementById('cSemana').value = '';
    document.getElementById('cPComprar').checked = false;
    document.getElementById('itensPedidoContainer').innerHTML = `
      <div class="item-form-row">
        <input type="number" class="iQtd" placeholder="Qtd" min="1" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        <select class="iProd" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option value="">Produto</option><option>POLO BÁSICA</option><option>BABYLOOK POLO</option><option>CAMISETA BÁSICA</option><option>CAMISETA POLIÉSTER</option><option>CAMISETA BABYLOOK FEMININA</option></select>
        <select class="iCor" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option value="">Cor</option><option>BRANCO</option><option>PRETO</option><option>CINZA MESCLA</option><option>CINZA ESCURO</option><option>AZUL TURQUESA</option><option>AZUL ROYAL</option><option>AZUL MARINHO</option><option>VERDE BANDEIRA</option><option>VERDE LIMÃO</option><option>VERDE MUSGO</option><option>VERMELHO</option><option>VINHO</option><option>LARANJA</option><option>AMARELO</option><option>PINK</option></select>
        <select class="iTam" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option>U</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>EG</option></select>
        <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:5px; cursor:pointer; padding:8px; font-weight: bold;">X</button>
      </div>`;
    document.getElementById('modalCadastro').style.display = 'block';
  }

  function fecharModal() { document.getElementById('modalCadastro').style.display = 'none'; }

  function addLinhaForm(qtd='', prod='', cor='', tam='') {
    const container = document.getElementById('itensPedidoContainer');
    const row = document.createElement('div');
    row.className = 'item-form-row';
    row.innerHTML = `
      <input type="number" class="iQtd" placeholder="Qtd" min="1" value="${qtd}" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
      <select class="iProd" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option value="">Produto</option><option ${prod=='POLO BÁSICA'?'selected':''}>POLO BÁSICA</option><option ${prod=='BABYLOOK POLO'?'selected':''}>BABYLOOK POLO</option><option ${prod=='CAMISETA BÁSICA'?'selected':''}>CAMISETA BÁSICA</option><option ${prod=='CAMISETA POLIÉSTER'?'selected':''}>CAMISETA POLIÉSTER</option><option ${prod=='CAMISETA BABYLOOK FEMININA'?'selected':''}>CAMISETA BABYLOOK FEMININA</option></select>
      <select class="iCor" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option value="">Cor</option><option ${cor=='BRANCO'?'selected':''}>BRANCO</option><option ${cor=='PRETO'?'selected':''}>PRETO</option><option ${cor=='CINZA MESCLA'?'selected':''}>CINZA MESCLA</option><option ${cor=='CINZA ESCURO'?'selected':''}>CINZA ESCURO</option><option ${cor=='AZUL TURQUESA'?'selected':''}>AZUL TURQUESA</option><option ${cor=='AZUL ROYAL'?'selected':''}>AZUL ROYAL</option><option ${cor=='AZUL MARINHO'?'selected':''}>AZUL MARINHO</option><option ${cor=='VERDE BANDEIRA'?'selected':''}>VERDE BANDEIRA</option><option ${cor=='VERDE LIMÃO'?'selected':''}>VERDE LIMÃO</option><option ${cor=='VERDE MUSGO'?'selected':''}>VERDE MUSGO</option><option ${cor=='VERMELHO'?'selected':''}>VERMELHO</option><option ${cor=='VINHO'?'selected':''}>VINHO</option><option ${cor=='LARANJA'?'selected':''}>LARANJA</option><option ${cor=='AMARELO'?'selected':''}>AMARELO</option><option ${cor=='PINK'?'selected':''}>PINK</option></select>
      <select class="iTam" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px;"><option ${tam=='U'?'selected':''}>U</option><option ${tam=='P'?'selected':''}>P</option><option ${tam=='M'?'selected':''}>M</option><option ${tam=='G'?'selected':''}>G</option><option ${tam=='GG'?'selected':''}>GG</option><option ${tam=='EG'?'selected':''}>EG</option></select>
      <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:5px; cursor:pointer; padding:8px; font-weight: bold;">X</button>`;
    container.appendChild(row);
  }

  function setSemana() {
    const val = document.getElementById('cData').value;
    if (!val) return;
    const partes = val.split('-');
    const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
    const dias = ["DOMINGO","SEGUNDA","TERÇA","QUARTA","QUINTA","SEXTA","SÁBADO"];
    document.getElementById('cSemana').value = dias[d.getDay()];
  }

  function abrirEdicao(pedidoId) {
    const itens = dadosBrutos.filter(p => String(p.ID) === String(pedidoId));
    const p = itens[0];
    document.getElementById('modalTitle').innerText = 'Editar Pedido ' + pedidoId;
    document.getElementById('editPedidoId').value = pedidoId;
    document.getElementById('cLoja').value = p.LOJA;
    document.getElementById('cLocal').value = p.LOCAL;
    document.getElementById('cLogo').value = p.LOGO;
    document.getElementById('cNome').value = p.NOME;
    document.getElementById('cApelido').value = p.APELIDO;
    
    // Converte data DD/MM/YYYY para YYYY-MM-DD
    if (p.DATA) {
      const d = p.DATA.split('/');
      document.getElementById('cData').value = `${d[2]}-${d[1]}-${d[0]}`;
    }
    document.getElementById('cSemana').value = p.SEMANA;
    document.getElementById('cPComprar').checked = p.P_COMPRAR == 'TRUE';

    const container = document.getElementById('itensPedidoContainer');
    container.innerHTML = '';
    itens.forEach(i => addLinhaForm(i.QTD, i.PRODUTO, i.COR, i.TAMANHO));
    
    document.getElementById('modalCadastro').style.display = 'block';
  }

  async function salvar() {
    const btn = document.getElementById('btnSalvar');
    const editId = document.getElementById('editPedidoId').value;
    const nome = document.getElementById('cNome').value.trim();
    const data = document.getElementById('cData').value;
    if (!nome || !data) { alert('Preencha Nome e Data.'); return; }
    const itens = Array.from(document.querySelectorAll('.item-form-row')).map(row => ({
      quantidade: row.querySelector('.iQtd').value,
      produto:    row.querySelector('.iProd').value,
      cor:        row.querySelector('.iCor').value,
      tamanho:    row.querySelector('.iTam').value
    })).filter(i => i.produto && i.quantidade);
    if (itens.length === 0) { alert('Adicione ao menos um produto.'); return; }
    const partes = data.split('-');
    const cab = {
      loja: document.getElementById('cLoja').value,
      local: document.getElementById('cLocal').value,
      logo: document.getElementById('cLogo').value,
      nome: nome,
      apelido: document.getElementById('cApelido').value,
      data: partes[2] + '/' + partes[1] + '/' + partes[0],
      semana: document.getElementById('cSemana').value,
      hora: new Date().toLocaleTimeString('pt-BR').substring(0, 5),
      pComprar: document.getElementById('cPComprar').checked
    };

    btn.disabled = true;
    btn.innerText = 'SALVANDO...';

    const action = editId ? 'editarPedido' : 'salvarPedido';
    await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: action, pedidoId: editId, cabecalho: cab, itens: itens })
    });
    
    alert("Pedido salvo com sucesso!");
    fecharModal();
    btn.disabled = false;
    btn.innerText = 'FINALIZAR CADASTRO';
    setTimeout(carregar, 1500);
  }

  function atualizar(row, campo, val) {
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'atualizarStatus', rowIndex: row, campo: campo, valor: val })
    }).then(() => setTimeout(carregar, 1000));
  }

  function duplicarPedido(pedidoId) {
    if (!confirm('Duplicar venda inteira?')) return;
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'duplicarPedido', pedidoId: pedidoId })
    }).then(() => setTimeout(carregar, 1000));
  }

  function adicionarLinha(pedidoId) {
    const prod = prompt("Nome do Produto:");
    if (!prod) return;
    const qtd = prompt("Quantidade:", "1");
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'adicionarLinha', pedidoId: pedidoId, item: { produto: prod, quantidade: qtd, cor: '', tamanho: '' } })
    }).then(() => setTimeout(carregar, 1000));
  }

  function duplicarLinha(pedidoId) {
    const itens = dadosBrutos.filter(p => String(p.ID) === String(pedidoId));
    const last = itens[itens.length - 1];
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'adicionarLinha', pedidoId: pedidoId, item: { produto: last.PRODUTO, quantidade: last.QTD, cor: last.COR, tamanho: last.TAMANHO } })
    }).then(() => setTimeout(carregar, 1000));
  }

  window.onload = carregar;
</script>
</body>
</html>
